<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Feedback Form</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <h1>Nelson Mandela Tribute</h1>

    <p>Visitor Feedback Form</p>

</header>

<nav>

<ul>

    <li><a href="index.html">Home</a></li>

</ul>

</nav>

<main>

<section>

<h2>Visitor Feedback</h2>

<form>

<label>Full Name</label><br>
<input type="text" placeholder="Enter your name" required><br><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your email" required><br><br>

<label>Country</label><br>

<select>

<option>Kenya</option>
<option>Uganda</option>
<option>Tanzania</option>
<option>South Africa</option>

</select>

<br><br>

<label>Gender</label><br>

<input type="radio" name="gender"> Male

<input type="radio" name="gender"> Female

<br><br>

<label>What do you admire most?</label><br>

<input type="checkbox"> Leadership<br>

<input type="checkbox"> Courage<br>

<input type="checkbox"> Forgiveness<br>

<input type="checkbox"> Equality<br><br>

<label>Your Message</label><br>

<textarea rows="6" cols="50"></textarea>

<br><br>

<input type="submit" value="Submit">

<input type="reset" value="Reset">

</form>

</section>

</main>

<footer>

<p>Created by Your Name © 2025</p>

</footer>

</body>

</html>
